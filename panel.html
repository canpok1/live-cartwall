<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Tab Audio Console</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>

  <!-- ===== ON AIR バー（シグネチャ） ===== -->
  <header class="rail" id="rail">
    <span class="rail__lamp" aria-hidden="true"></span>
    <span class="rail__label" id="railLabel">待機中</span>
    <button class="rail__btn" id="btnReload" type="button" title="音源を読み直す">再読込</button>
  </header>

  <!-- ===== 接続先タブ ===== -->
  <details class="bay bay--fold" id="bayOutput">
    <summary class="fold__head">
      <span class="fold__title">出力先タブ</span>
      <span class="fold__status is-off" id="outputStatus">未接続</span>
      <span class="fold__chev" aria-hidden="true">▸</span>
    </summary>

    <div class="fold__body">
      <div class="patch">
        <select id="tabSelect" class="patch__select" aria-label="画面共有するタブ"></select>
        <button id="btnRefresh" class="btn btn--ghost" type="button" title="タブ一覧を更新">↻</button>
      </div>

      <button id="btnConnect" class="btn btn--wide" type="button">このタブに接続</button>

      <p class="note" id="connNote">
        画面共有するスライドのタブを選んで接続します。音はこのタブの中で鳴ります。
      </p>
    </div>
  </details>

  <!-- ===== タブ音源 ===== -->
  <details class="bay bay--fold" id="baySource">
    <summary class="fold__head">
      <span class="fold__title">タブ音源</span>
      <span class="fold__status is-off" id="sourceStatus">なし</span>
      <span class="fold__chev" aria-hidden="true">▸</span>
    </summary>

    <div class="fold__body">
      <div class="patch">
        <select id="sourceSelect" class="patch__select" aria-label="取り込むタブ"></select>
        <button id="btnAddSource" class="btn btn--ghost" type="button" title="このタブの音声を取り込む">追加</button>
      </div>

      <div id="tabSources" class="tsrc"></div>

      <p class="note" id="sourceNote">
        他タブで再生中の音声（YouTube・配信・音楽サービス等）を出力先タブに合流させます。再生・停止はそのタブ側で操作し、ここでは音量のみ調整します。
      </p>
    </div>
  </details>

  <!-- ===== ボタンエリア ===== -->
  <section class="bay bay--grow">
    <div class="bay__title">
      <div class="modes" role="group" aria-label="モード切替">
        <button type="button" class="modes__opt" id="modeEdit" aria-pressed="true">編集</button>
        <button type="button" class="modes__opt" id="modeOperate" aria-pressed="false">操作</button>
      </div>

      <div class="sizer" id="sizer" role="group" aria-label="ボタンサイズ調整">
        <div class="sizer__ctl">
          <span class="sizer__label">横</span>
          <input type="range" id="tileW" class="sizer__range" min="72" max="200" step="4" value="96" aria-label="ボタンの横幅" />
          <output class="sizer__val" id="tileWVal">96</output>
        </div>
        <div class="sizer__ctl">
          <span class="sizer__label">縦</span>
          <input type="range" id="tileH" class="sizer__range" min="56" max="160" step="4" value="72" aria-label="ボタンの縦幅" />
          <output class="sizer__val" id="tileHVal">72</output>
        </div>
      </div>
    </div>

    <div id="buttons" class="buttons"></div>

    <div id="empty" class="empty">
      <p class="empty__head">音源がまだありません</p>
      <p class="empty__body">BGMとドラムロールの音声ファイルを読み込むと、ここに再生ボタンが並びます。</p>
    </div>

    <label class="drop" id="drop">
      <input type="file" id="fileInput" accept="audio/*" multiple hidden />
      <span class="drop__main">音源を追加</span>
      <span class="drop__sub">クリック、またはファイルをドロップ（mp3 / wav / m4a / ogg）</span>
    </label>
  </section>

  <!-- ===== マスター & 全停止 ===== -->
  <footer class="deck">
    <div class="fader">
      <label class="fader__label" for="master">マスター</label>
      <input type="range" id="master" class="fader__range" min="0" max="1" step="0.01" value="1" />
      <output class="fader__val" id="masterVal">100</output>
    </div>

    <button id="btnStopAll" class="stopall" type="button">
      <span class="stopall__key">⌥⇧0</span>
      全停止
    </button>
  </footer>

  <script src="panel.js"></script>
</body>
</html>
