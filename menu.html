<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Live Cartwall</title>
  <link rel="stylesheet" href="menu.css" />
</head>
<body class="menu">

  <header class="menu__head">
    <span class="menu__lamp" aria-hidden="true"></span>
    <span class="menu__brand">Live Cartwall</span>
  </header>

  <!-- 案内：状態に応じて「次にやること」を1つ示す -->
  <div class="menu__step" id="step">
    <span class="menu__stepmsg" id="stepMsg">まずは音声を再生する場所を決めましょう</span>
  </div>

  <!-- 再生タブ（出力先）。設定後は不要なので接続中は非表示（切断は操作パネルで） -->
  <section class="menu__sec" id="secOutput">
    <button class="mbtn" id="btnSetOutput" type="button">このタブを再生タブにする</button>
  </section>

  <!-- 音源タブ（取り込み） -->
  <section class="menu__sec is-hidden" id="secSource">
    <div class="menu__sectop">
      <span class="menu__sectitle">音源タブ</span>
      <span class="menu__status is-off" id="srcStatus">なし</span>
    </div>
    <button class="mbtn" id="btnAddSource" type="button" disabled>このタブの音声を取り込む</button>
    <p class="menu__note" id="note"></p>
  </section>

  <!-- 操作パネル（音源追加 / 再生） -->
  <footer class="menu__foot is-hidden" id="secPanel">
    <button class="mbtn mbtn--wide" id="btnOpenPanel" type="button">操作パネルを開く</button>
  </footer>

  <script src="menu.js"></script>
</body>
</html>
